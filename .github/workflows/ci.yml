name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      # App-hosted XCTest double-frees on this toolchain (see CLAUDE.md), so
      # there is no fecniTests target. CI verifies the deterministic core here
      # and that the app compiles below; it does NOT test app behavior.
      - name: Unit tests (CaptureKit core)
        run: swift test --package-path Packages/CaptureKit

      - name: Build app (Release, ad-hoc)
        run: |
          xcodebuild build \
            -project fecni.xcodeproj -scheme fecni \
            -configuration Release -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO
